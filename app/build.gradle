plugins {
    id 'com.android.application'
}

android {
    namespace 'com.hwpviewer'
    compileSdk 34

    defaultConfig {
        applicationId "com.hwpviewer"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            // 서명 없이 설치 가능한 디버그 APK (사이드로드용)
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
}
